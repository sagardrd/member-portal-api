spring.application.name=JAWS
server.port=8080

# Database Configuration
# MySQL Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/jaws
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Member Search Queries
queryByMembershipNo=SELECT uniqueId, membershipNo, name, mobileNo, doj, photo FROM membership_details WHERE membershipNo = ?
queryByMobileNo=SELECT uniqueId, membershipNo, name, mobileNo, doj, photo FROM membership_details WHERE membershipNo = ( SELECT membershipNo FROM membership_details WHERE mobileNo = ?)
queryByName=SELECT uniqueId, membershipNo, name, mobileNo, doj, photo FROM membership_details WHERE membershipNo in ( SELECT membershipNo FROM membership_details WHERE name LIKE ?)

# Event Queries
queryGetEventName=SELECT description FROM events WHERE eventId = ?
queryEventList=SELECT eventId, eventName, eventYear, eventDate FROM events

# Attendance Queries
queryInsertAttendance=INSERT INTO event_attendance (eventId, memberUniqueId) VALUES (?, ?)
queryDownloadPDF=SELECT ROW_NUMBER() OVER (ORDER BY markedOn) AS Serial_No, m.membershipNo as Membership_No, m.name as Member_Name FROM event_attendance ea JOIN membership_details m ON ea.memberUniqueId = m.uniqueId WHERE ea.eventId = ? ORDER BY markedOn

# Photo Upload Queries
updatePhotoByMembershipNo=UPDATE membership_details SET photo = ? WHERE membershipNo = ?
updatePhotoByMobileNo=UPDATE membership_details SET photo = ? WHERE mobileNo = ?

# Photo folder path for bulk upload
photo.folder.path=D:/Sagar/Learning/Dev/JawsPhotos

# Increase limits to handle photos up to 2MB
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB



# Logging Configuration
logging.level.root=INFO
logging.level.com.jaws.app=INFO
logging.level.web=INFO
logging.file.name=logs/jaws-app.log

# Patterns
#logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n$ex
#logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p --- [%t] %-40.40logger{39} : %m%n$ex

# Rotation Policy
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.file-name-pattern=logs/jaws-app-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB